name: Release

on:
    push:
        branches: [main]

# Never run two releases against the same ref at once.
concurrency: release-${{ github.ref }}

permissions:
    contents: write # create the version PR / tags
    pull-requests: write # open the "Version Packages" PR
    id-token: write # OIDC trusted publishing + provenance

jobs:
    release:
        name: version or publish
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: 1.3.11

            # `changeset publish` shells out to `npm publish`. OIDC trusted publishing
            # needs a recent npm (>= 11.5.1), newer than the runner default, so pin
            # node + upgrade npm. No NPM_TOKEN: auth comes from the trusted publisher
            # configured on npmjs.com (GitHub Actions · vrybakk/docmosaic · release.yml)
            # for @docmosaic/core and @docmosaic/react.
            - uses: actions/setup-node@v4
              with:
                  node-version: 22
            - name: Use a publish-capable npm
              run: npm install --global npm@latest

            - name: Install dependencies
              run: bun install --frozen-lockfile

            # While changesets are pending, opens/updates a "Version Packages" PR.
            # Once that PR is merged - versions bumped, changesets consumed - the next
            # push to main runs `bun run release` (turbo build + changeset publish),
            # which authenticates via OIDC and attaches provenance automatically.
            - name: Create release PR or publish
              uses: changesets/action@v1
              with:
                  version: bun run version-packages
                  publish: bun run release
                  commit: 'chore: version packages'
                  title: 'chore: version packages'
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  NPM_CONFIG_PROVENANCE: 'true'
